services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-ai-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage:/storage
      - ./:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-ai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: local-ai-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - local-ai-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: local-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-network

  redis:
    image: redis:7-alpine
    container_name: local-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - local-ai-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: local-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - local-ai-network
    profiles:
      - qdrant

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: local-ai-open-webui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT:-3080}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://backend:3001/v1
      - OPENAI_API_KEY=${OPENWEBUI_API_KEY:-local-dev-key}
      - WEBUI_NAME=Local AI Assistant
      - ENABLE_SIGNUP=true
      - DEFAULT_MODELS=local-assistant
    depends_on:
      - backend
    networks:
      - local-ai-network
    profiles:
      - openwebui

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  open_webui_data:

networks:
  local-ai-network:
    driver: bridge
