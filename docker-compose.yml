name: my_llm

x-worker-base: &worker-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - ./backend:/app
    - /app/node_modules
    - ./storage:/storage
    - ./:/workspace:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - local-ai-network

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local-ai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ROLE=api
      - MEDIA_WORKER_URL=http://media-worker:5000
      - MEDIA_STORAGE_ROOT=/storage/media
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage:/storage
      - ./:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - local-ai-network
    profiles:
      - docker-backend

  worker-all:
    <<: *worker-base
    container_name: local-ai-worker-all
    command: npm run worker:all
    environment:
      - APP_ROLE=worker-all
      - MEDIA_WORKER_URL=http://media-worker:5000
      - MEDIA_STORAGE_ROOT=/storage/media

  worker-orchestrator:
    <<: *worker-base
    container_name: local-ai-worker-orchestrator
    command: npm run worker:orchestrator
    environment:
      - APP_ROLE=worker-orchestrator
    profiles:
      - workers-split

  worker-indexing:
    <<: *worker-base
    container_name: local-ai-worker-indexing
    command: npm run worker:indexing
    environment:
      - APP_ROLE=worker-indexing
    profiles:
      - workers-split

  worker-embeddings:
    <<: *worker-base
    container_name: local-ai-worker-embeddings
    command: npm run worker:embeddings
    environment:
      - APP_ROLE=worker-embeddings
    profiles:
      - workers-split

  worker-memory:
    <<: *worker-base
    container_name: local-ai-worker-memory
    command: npm run worker:memory
    environment:
      - APP_ROLE=worker-memory
    profiles:
      - workers-split

  postgres:
    image: pgvector/pgvector:pg16
    container_name: local-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-8MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1GB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - local-ai-network

  redis:
    image: redis:7-alpine
    container_name: local-ai-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - local-ai-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: local-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - local-ai-network
    profiles:
      - qdrant

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: local-ai-open-webui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PORT:-3080}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=${OPENWEBUI_BACKEND_URL:-http://host.docker.internal:3001/v1}
      - OPENAI_API_KEY=${OPENWEBUI_API_KEY:-local-dev-key}
      - WEBUI_NAME=Local AI Assistant
      - ENABLE_SIGNUP=true
      - DEFAULT_MODELS=local-assistant
    networks:
      - local-ai-network

  media-worker:
    build:
      context: ./media-worker
      dockerfile: Dockerfile
      args:
        INSTALL_OCR: "${MEDIA_INSTALL_OCR:-false}"
        INSTALL_DOCLING: "${MEDIA_INSTALL_DOCLING:-false}"
        INSTALL_VISION: "${MEDIA_INSTALL_VISION:-false}"
    container_name: local-ai-media-worker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - STORAGE_ROOT=/storage/media
      - MEDIA_DEFAULT_PROCESSING_MODE=${MEDIA_DEFAULT_PROCESSING_MODE:-balanced}
      - MEDIA_OCR_PRIMARY=paddleocr
      - MEDIA_ENABLE_PADDLEOCR=${MEDIA_ENABLE_PADDLEOCR:-false}
      - MEDIA_ENABLE_TESSERACT_FALLBACK=true
      - MEDIA_OCR_LANGUAGES=pt,en
      - MEDIA_ENABLE_PP_STRUCTURE=${MEDIA_ENABLE_PP_STRUCTURE:-false}
      - MEDIA_ENABLE_DOCLING=${MEDIA_ENABLE_DOCLING:-false}
      - MEDIA_DOCLING_ONLY_FOR_DOCUMENTS=true
      - MEDIA_ENABLE_VLM=${MEDIA_ENABLE_VLM:-false}
      - MEDIA_VLM_PROVIDER=ollama
      - MEDIA_VLM_MODEL=qwen2.5vl:7b
      - MEDIA_VLM_BASE_URL=http://host.docker.internal:11434
      - MEDIA_VLM_MAX_IMAGE_SIZE=1280
      - MEDIA_GENERATE_THUMBNAILS=true
      - MEDIA_THUMBNAIL_FORMAT=webp
      - MEDIA_MAX_IMAGE_WIDTH=8000
      - MEDIA_MAX_IMAGE_HEIGHT=8000
      - MEDIA_PROCESSING_TIMEOUT_MS=180000
    volumes:
      - ./storage:/storage
    ports:
      - "${MEDIA_WORKER_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - local-ai-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  open_webui_data:

networks:
  local-ai-network:
    driver: bridge
